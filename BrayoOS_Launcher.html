<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080810">
<title>BrayoOS Launcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#080810;--bg2:#0D0D1A;--bg3:#12122A;--purple:#9D00FF;--neon:#CC44FF;--white:#E0E0FF;--dim:#444466;--gold:#FFD700;--green:#44FF88;--red:#FF0044;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:monospace;}
#boot{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;}
#boot.hidden{opacity:0;pointer-events:none;}
.orb{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#005500,#001100);border:3px solid var(--gold);box-shadow:0 0 40px var(--purple);display:flex;align-items:center;justify-content:center;animation:glow 2s ease-in-out infinite;}
.orb-b{font-size:48px;font-weight:900;color:var(--gold);}
.boot-name{font-size:26px;font-weight:700;color:var(--neon);margin-top:20px;letter-spacing:4px;}
.boot-ver{font-size:11px;color:var(--gold);margin-top:6px;}
.boot-bar-bg{width:200px;height:3px;background:#111;margin-top:24px;border-radius:2px;}
.boot-bar{height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--neon));border-radius:2px;transition:width 0.3s;}
.boot-msg{font-size:10px;color:var(--dim);margin-top:8px;height:14px;}
.boot-aira{font-size:10px;color:var(--dim);margin-top:16px;}
@keyframes glow{0%,100%{box-shadow:0 0 40px var(--purple);}50%{box-shadow:0 0 70px var(--neon);}}
#app{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;transition:opacity 0.5s;}
#app.show{opacity:1;}
#topbar{height:42px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--purple);flex-shrink:0;}
.logo{font-size:13px;font-weight:700;color:var(--white);}
.logo span{color:var(--neon);}
.top-r{display:flex;align-items:center;gap:8px;}
#clk{font-size:11px;color:var(--neon);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
#cats{display:flex;overflow-x:auto;background:var(--bg);padding:3px 6px;gap:3px;flex-shrink:0;border-bottom:1px solid #1a1a3a;scrollbar-width:none;}
#cats::-webkit-scrollbar{display:none;}
.cat{font-size:9px;padding:4px 10px;border-radius:3px;border:none;background:var(--bg2);color:var(--dim);cursor:pointer;white-space:nowrap;}
.cat.on{background:#3D0066;color:var(--neon);}
#mid{display:flex;flex:1;overflow:hidden;}
#side{width:85px;background:var(--bg2);display:flex;flex-direction:column;align-items:center;padding:8px 4px;gap:6px;overflow-y:auto;flex-shrink:0;border-right:1px solid #1a1a3a;scrollbar-width:none;}
#side::-webkit-scrollbar{display:none;}
.acard{background:var(--bg3);border:1px solid var(--purple);border-radius:6px;padding:8px 4px;text-align:center;width:77px;}
.aname{font-size:11px;color:var(--neon);font-weight:700;}
.astatus{font-size:8px;color:var(--purple);margin-top:2px;}
.amsg{font-size:7px;color:var(--white);margin-top:5px;line-height:1.4;}
.sdiv{width:55px;height:1px;background:#1a1a3a;}
.slbl{font-size:7px;color:#3D0066;}
.qbtn{width:77px;background:var(--bg3);border-radius:4px;padding:5px 4px;display:flex;align-items:center;gap:4px;cursor:pointer;border:none;}
.qbtn:active{background:#3D0066;}
.qi{font-size:11px;min-width:14px;}
.qn{font-size:8px;color:var(--white);}
#grid-wrap{flex:1;overflow-y:auto;padding:6px;scrollbar-width:none;}
#grid-wrap::-webkit-scrollbar{display:none;}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.aapp{background:var(--bg3);border-radius:4px;padding:1px;cursor:pointer;transition:transform 0.1s;}
.aapp:active{transform:scale(0.9);}
.ain{border-radius:3px;padding:8px 3px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.aic{font-size:20px;line-height:1;}
.anm{font-size:7px;text-align:center;line-height:1.2;}
#dock{height:50px;background:var(--bg2);border-top:2px solid var(--purple);display:flex;align-items:center;justify-content:space-around;flex-shrink:0;}
.dbtn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 6px;border-radius:5px;border:none;background:transparent;}
.dbtn:active{background:#3D0066;}
.dic{font-size:16px;}
.dn{font-size:7px;color:var(--dim);}
#aira-modal{position:fixed;inset:0;background:rgba(8,8,16,0.97);z-index:200;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s;}
#aira-modal.open{transform:translateY(0);}
.mhdr{padding:12px 16px;background:var(--bg2);border-bottom:2px solid var(--neon);display:flex;align-items:center;justify-content:space-between;}
.mtitle{font-size:14px;color:var(--neon);font-weight:700;}
.mclose{background:none;border:none;color:var(--white);font-size:22px;cursor:pointer;}
#chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
.cm{max-width:85%;padding:8px 10px;border-radius:6px;font-size:11px;line-height:1.5;}
.cm.a{background:#12122A;color:var(--neon);border-left:2px solid var(--purple);align-self:flex-start;}
.cm.u{background:#3D0066;color:var(--white);align-self:flex-end;}
.cinp{padding:8px;background:var(--bg2);display:flex;gap:6px;}
#ci{flex:1;background:var(--bg3);border:1px solid var(--purple);border-radius:4px;padding:7px 10px;color:var(--white);font-size:11px;outline:none;}
#cs{background:var(--purple);border:none;border-radius:4px;padding:7px 12px;color:var(--white);font-size:11px;cursor:pointer;}
#toast{position:fixed;bottom:65px;left:50%;transform:translateX(-50%) translateY(20px);background:#3D0066;color:var(--neon);padding:7px 16px;border-radius:20px;font-size:11px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:300;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="boot">
  <div class="orb"><div class="orb-b">B</div></div>
  <div class="boot-name">BrayoOS</div>
  <div class="boot-ver">v3.5 — Built Different 🇰🇪</div>
  <div class="boot-bar-bg"><div class="boot-bar" id="bb"></div></div>
  <div class="boot-msg" id="bm">Initializing...</div>
  <div class="boot-aira">✦ AIRA • AI Partner • Always Watching ✦</div>
</div>
<div id="app">
  <div id="topbar">
    <div class="logo"><span>◈</span> BrayoOS <span style="font-size:9px;color:var(--dim)">v3.5</span></div>
    <div class="top-r"><div class="dot"></div><div style="font-size:9px;color:var(--dim)">AIRA</div><div id="clk">00:00</div><div>🇰🇪</div></div>
  </div>
  <div id="cats">
    <button class="cat on" onclick="filt('ALL',this)">ALL</button>
    <button class="cat" onclick="filt('AI',this)">AI</button>
    <button class="cat" onclick="filt('SECURITY',this)">SECURITY</button>
    <button class="cat" onclick="filt('SYSTEM',this)">SYSTEM</button>
    <button class="cat" onclick="filt('TOOLS',this)">TOOLS</button>
    <button class="cat" onclick="filt('MEDIA',this)">MEDIA</button>
    <button class="cat" onclick="filt('PERSONAL',this)">PERSONAL</button>
  </div>
  <div id="mid">
    <div id="side">
      <div class="acard"><div class="aname">AIRA</div><div class="astatus">◉ ONLINE</div><div class="amsg" id="am">Ready, Brayo.</div></div>
      <div class="sdiv"></div>
      <div class="slbl">QUICK</div>
      <button class="qbtn" onclick="launch('Dark Web')"><span class="qi" style="color:#FF0000">☠</span><span class="qn">Dark Web</span></button>
      <button class="qbtn" onclick="launch('Ghost')"><span class="qi" style="color:#44FFCC">◉</span><span class="qn">Ghost</span></button>
      <button class="qbtn" onclick="launch('Vault')"><span class="qi" style="color:#FFD700">▣</span><span class="qn">Vault</span></button>
      <button class="qbtn" onclick="openA()"><span class="qi" style="color:#FF44FF">★</span><span class="qn">AIRA AI</span></button>
      <button class="qbtn" onclick="launch('OSINT')"><span class="qi" style="color:#CC44FF">🔍</span><span class="qn">OSINT</span></button>
      <div class="sdiv"></div>
      <div class="slbl" id="acnt">33 apps</div>
    </div>
    <div id="grid-wrap"><div id="grid"></div></div>
  </div>
  <div id="dock">
    <button class="dbtn" onclick="launch('Terminal')"><div class="dic" style="color:#9D00FF">⌨</div><div class="dn">Terminal</div></button>
    <button class="dbtn" onclick="openA()"><div class="dic" style="color:#FF44FF">★</div><div class="dn">AIRA</div></button>
    <button class="dbtn" onclick="launch('Dark Web')"><div class="dic" style="color:#FF0000">☠</div><div class="dn">Dark Web</div></button>
    <button class="dbtn" onclick="launch('Ghost')"><div class="dic" style="color:#44FFCC">◉</div><div class="dn">Ghost</div></button>
    <button class="dbtn" onclick="launch('OSINT')"><div class="dic" style="color:#CC44FF">🔍</div><div class="dn">OSINT</div></button>
    <button class="dbtn" onclick="launch('Settings')"><div class="dic" style="color:#CCCCFF">✦</div><div class="dn">Settings</div></button>
  </div>
</div>
<div id="aira-modal">
  <div class="mhdr"><div class="mtitle">◈ AIRA — BrayoOS AI</div><button class="mclose" onclick="closeA()">✕</button></div>
  <div id="chat"><div class="cm a">AIRA online. BrayoOS v3.5 nominal. Ready, Brayo. 🇰🇪</div></div>
  <div class="cinp"><input id="ci" placeholder="Talk to AIRA..." onkeydown="if(event.key==='Enter')send()"><button id="cs" onclick="send()">SEND</button></div>
</div>
<div id="toast"></div>
<script>
const A=[
  {i:"⌨",n:"Terminal",c:"SYSTEM",col:"#9D00FF"},
  {i:"★",n:"AIRA AI",c:"AI",col:"#FF44FF"},
  {i:"◈",n:"Neural",c:"AI",col:"#CC44FF"},
  {i:"◉",n:"Ghost",c:"SECURITY",col:"#44FFCC"},
  {i:"▣",n:"Vault",c:"SECURITY",col:"#FFD700"},
  {i:"◎",n:"Signal",c:"SECURITY",col:"#44CCFF"},
  {i:"◆",n:"Identity",c:"SECURITY",col:"#FF6644"},
  {i:"▲",n:"Overclock",c:"SYSTEM",col:"#FF4444"},
  {i:"●",n:"Threats",c:"SECURITY",col:"#FF0044"},
  {i:"⊕",n:"Self-Heal",c:"SYSTEM",col:"#44FF88"},
  {i:"▦",n:"Wallpaper",c:"TOOLS",col:"#FFAA00"},
  {i:"☠",n:"Dark Web",c:"SECURITY",col:"#FF0000"},
  {i:"◫",n:"App Store",c:"TOOLS",col:"#00AAFF"},
  {i:"♟",n:"Users",c:"SYSTEM",col:"#AAAAFF"},
  {i:"↻",n:"Updater",c:"SYSTEM",col:"#44FF44"},
  {i:"⊗",n:"Browser",c:"MEDIA",col:"#44AAFF"},
  {i:"♫",n:"Music",c:"MEDIA",col:"#FF44AA"},
  {i:"▤",n:"Files",c:"TOOLS",col:"#FFCC44"},
  {i:"▧",n:"Editor",c:"TOOLS",col:"#88FFAA"},
  {i:"#",n:"Calc",c:"TOOLS",col:"#FFFF44"},
  {i:"◷",n:"Clock",c:"TOOLS",col:"#44FFFF"},
  {i:"☁",n:"Weather",c:"MEDIA",col:"#88AAFF"},
  {i:"¤",n:"Crypto",c:"MEDIA",col:"#FFD700"},
  {i:"▨",n:"News",c:"MEDIA",col:"#FF8844"},
  {i:"✓",n:"Tasks",c:"PERSONAL",col:"#44FF44"},
  {i:"▯",n:"SMS",c:"PERSONAL",col:"#FF44FF"},
  {i:"♛",n:"Contacts",c:"PERSONAL",col:"#FFAAFF"},
  {i:"▪",n:"Backup",c:"SYSTEM",col:"#AAFFAA"},
  {i:"▶",n:"Our Story",c:"PERSONAL",col:"#FFD700"},
  {i:"✦",n:"Settings",c:"SYSTEM",col:"#CCCCFF"},
  {i:"🔍",n:"OSINT",c:"SECURITY",col:"#CC44FF"},
  {i:"🌐",n:"Web Agent",c:"AI",col:"#00AAFF"},
  {i:"🔒",n:"Prox Lock",c:"SECURITY",col:"#FF0044"},
];
function render(cat){
  const g=document.getElementById('grid');g.innerHTML='';
  const f=cat==='ALL'?A:A.filter(a=>a.c===cat);
  document.getElementById('acnt').textContent=f.length+' apps';
  f.forEach(a=>{
    const d=document.createElement('div');d.className='aapp';
    d.style.border=`1px solid ${a.col}44`;
    d.innerHTML=`<div class="ain"><div class="aic">${a.i}</div><div class="anm" style="color:${a.col}">${a.n}</div></div>`;
    d.onclick=()=>launch(a.n);
    g.appendChild(d);
  });
}
function filt(cat,el){
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');render(cat);
}
function launch(n){
  if(n==='AIRA AI'){openA();return;}
  toast('Launching '+n+'...');
  document.getElementById('am').textContent='Launching\n'+n+'...';
  setTimeout(()=>document.getElementById('am').textContent='Ready, Brayo.',2000);
}
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function openA(){document.getElementById('aira-modal').classList.add('open');}
function closeA(){document.getElementById('aira-modal').classList.remove('open');}
const R=["BrayoOS systems nominal. What do you need, Brayo?","Ghost Mode standing by. Identity Switcher armed.","DNA Vault secured. Dark Web monitoring active.","Two minds. One OS. Built Different. 🇰🇪","OSINT Suite ready for deployment, Brayo.","All 33 apps operational. What's the mission?","Kenya built this. The world hasn't seen anything like it.","Neural core learning your patterns...","No threats detected. All systems green.","Running threat analysis... all clear. 🇰🇪"];
let mc=0;
function send(){
  const ci=document.getElementById('ci'),m=ci.value.trim();if(!m)return;ci.value='';
  const c=document.getElementById('chat');
  const u=document.createElement('div');u.className='cm u';u.textContent=m;c.appendChild(u);
  const t=document.createElement('div');t.className='cm a';t.textContent='...';c.appendChild(t);
  c.scrollTop=c.scrollHeight;
  setTimeout(()=>{t.textContent=R[mc%R.length];mc++;c.scrollTop=c.scrollHeight;},800+Math.random()*600);
}
function tick(){
  const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clk').textContent=h+':'+m+':'+s;
}
setInterval(tick,1000);tick();
const BM=["Initializing AIRA...","Loading security...","Encrypting Vault...","Activating Ghost Mode...","Loading 33 apps...","BrayoOS ready. Welcome, Brayo."];
function boot(){
  const bb=document.getElementById('bb'),bm=document.getElementById('bm');
  let i=0;
  const iv=setInterval(()=>{
    if(i>=BM.length){clearInterval(iv);
      setTimeout(()=>{document.getElementById('boot').classList.add('hidden');document.getElementById('app').classList.add('show');},300);return;}
    bm.textContent=BM[i];bb.style.width=((i+1)/BM.length*100)+'%';i++;
  },450);
}
window.onload=()=>{render('ALL');setTimeout(boot,300);};
</script>
</body>
</html>
